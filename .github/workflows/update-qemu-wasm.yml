name: Update QEMU-WASM

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Update QEMU-WASM submodule
        run: |
          git submodule update --remote --recursive external/qemu-wasm-demo
          git status --short
      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet --submodule=log; then
            git add .gitmodules external/qemu-wasm-demo
            git commit -m "Update QEMU-WASM submodule"
            git push
          fi
